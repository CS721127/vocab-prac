<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabMaster Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>VocabMaster</h1>
            <button id="btnSettings">⚙️</button>
        </header>

        <div id="main-view">
            <div class="toolbar">
                <button id="btnAdd" class="primary">+ Add</button>
                <button id="btnPractice">Practice</button>
            </div>
            
            <div id="list-container">
                <!-- List items will go here -->
            </div>
        </div>

        <!-- Add Dialog -->
        <div id="dialog-add" class="dialog hidden">
            <div class="dialog-content">
                <h2>Add Word</h2>
                <input type="text" id="inpTerm" placeholder="Term">
                <input type="text" id="inpDef" placeholder="Definition">
                <input type="text" id="inpNotes" placeholder="Notes">
                <div class="dialog-buttons">
                    <button id="btnCancelAdd">Cancel</button>
                    <button id="btnSaveAdd" class="primary">Save</button>
                </div>
            </div>
        </div>

        <!-- Practice Mode -->
        <div id="view-practice" class="hidden">
            <div class="practice-card">
                <h2 id="lblQuestion">Question</h2>
                <input type="text" id="inpAnswer" placeholder="Answer">
                <p id="lblFeedback"></p>
                <button id="btnCheck" class="primary">Check</button>
                <button id="btnNext" disabled>Next</button>
                <button id="btnExitPractice" class="secondary">Exit</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
